<section class="pc-calendar-card">
  <div class="pc-calendar-card__top">
    <div>
      <div class="pc-calendar-card__eyebrow">Appointments Overview</div>
    </div>

    <div class="pc-calendar-card__actions">
      <div class="pc-calendar-nav">
        <button type="button" class="pc-calendar-nav__button" (click)="goToPreviousWeek()">
          ‹
        </button>
        <button type="button" class="pc-calendar-nav__today" (click)="goToToday()">
          Today
        </button>
        <button type="button" class="pc-calendar-nav__button" (click)="goToNextWeek()">
          ›
        </button>
      </div>

      <button type="button" class="btn btn--primary" (click)="requestAdd()">
        Add Appointment
      </button>
    </div>
  </div>

  <div class="pc-calendar-card__body">
    <full-calendar [options]="options()"></full-calendar>
  </div>
</section>
