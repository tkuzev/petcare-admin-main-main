<div class="pc-modal" role="dialog" aria-modal="true" aria-labelledby="pc-add-title">
  <div class="pc-modal__header">
    <h2 id="pc-add-title" class="pc-modal__title">Add appointment</h2>
    <button type="button" class="pc-icon-btn" (click)="cancel()" aria-label="Close dialog">✕</button>
  </div>

  <form class="pc-modal__body" [formGroup]="form" (ngSubmit)="submit()">
    <div class="pc-grid">
      <label class="pc-field">
        <span class="pc-label">Owner name<span aria-hidden="true">*</span></span>
        <div class="pc-inputwrap">
          <input
            class="pc-input"
            type="text"
            formControlName="ownerEmail"
            required
            [attr.aria-invalid]="isInvalid('ownerEmail')"
          />
        </div>
        @if (isInvalid('ownerEmail')) {
          <span class="pc-error" role="alert">Required</span>
        }
      </label>

      <label class="pc-field">
        <span class="pc-label">Pet type<span aria-hidden="true">*</span></span>
        <div class="pc-inputwrap">
          <select class="pc-input" formControlName="petType" required>
            <option value="Dog">Dog</option>
            <option value="Cat">Cat</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </label>

      @if (showOtherPetType()) {
        <label class="pc-field">
          <span class="pc-label">What animal is it?<span aria-hidden="true">*</span></span>
          <div class="pc-inputwrap">
            <input
              class="pc-input"
              type="text"
              formControlName="otherPetType"
              required
              [attr.aria-invalid]="isInvalid('otherPetType')"
            />
          </div>
          @if (isInvalid('otherPetType')) {
            <span class="pc-error" role="alert">Required</span>
          }
        </label>
      }

      <label class="pc-field">
        <span class="pc-label">Pet name</span>
        <div class="pc-inputwrap">
          <input class="pc-input" type="text" formControlName="petName" />
        </div>
      </label>

      <label class="pc-field">
        <span class="pc-label">Service<span aria-hidden="true">*</span></span>
        <div class="pc-inputwrap">
          <select
            class="pc-input"
            formControlName="serviceId"
            required
            [attr.aria-invalid]="isInvalid('serviceId')"
          >
            <option value="" disabled>Select service</option>
            @for (service of activeServices(); track service.id) {
              <option [value]="service.id">{{ service.name }}</option>
            }
          </select>
        </div>
        @if (isInvalid('serviceId')) {
          <span class="pc-error" role="alert">Required</span>
        }
      </label>

      <label class="pc-field">
        <span class="pc-label">Team member<span aria-hidden="true">*</span></span>
        <div class="pc-inputwrap">
          <select
            class="pc-input"
            formControlName="staffId"
            required
            [disabled]="!canChooseStaff()"
            [attr.aria-invalid]="isInvalid('staffId')"
          >
            @for (m of availableStaff(); track m.id) {
              <option [value]="m.id">{{ m.name }}</option>
            }
          </select>
        </div>
        @if (isInvalid('staffId')) {
          <span class="pc-error" role="alert">Required</span>
        }
      </label>

      <label class="pc-field">
        <span class="pc-label">Date<span aria-hidden="true">*</span></span>
        <div class="pc-inputwrap">
          <input
            class="pc-input"
            type="date"
            formControlName="date"
            required
            [attr.aria-invalid]="isInvalid('date')"
          />
        </div>
        @if (isInvalid('date')) {
          <span class="pc-error" role="alert">Required</span>
        }
      </label>

      <label class="pc-field">
        <span class="pc-label">Start time<span aria-hidden="true">*</span></span>
        <div class="pc-inputwrap">
          <input
            class="pc-input"
            type="time"
            formControlName="startTime"
            step="300"
            required
            [attr.aria-invalid]="isInvalid('startTime')"
          />
        </div>
        @if (isInvalid('startTime')) {
          <span class="pc-error" role="alert">Required</span>
        }
      </label>

      <label class="pc-field">
        <span class="pc-label">Duration<span aria-hidden="true">*</span></span>
        <div class="pc-inputwrap">
          <select class="pc-input" formControlName="duration" required>
            <option value="15">15 min</option>
            <option value="30">30 min</option>
            <option value="45">45 min</option>
            <option value="60">1 hour</option>
            <option value="custom">Custom…</option>
          </select>
        </div>
      </label>

      @if (showCustomEnd()) {
        <label class="pc-field">
          <span class="pc-label">End time<span aria-hidden="true">*</span></span>
          <div class="pc-inputwrap">
            <input
              class="pc-input"
              type="time"
              formControlName="customEndTime"
              step="300"
              required
              [attr.aria-invalid]="isInvalid('customEndTime')"
            />
          </div>
          @if (isInvalid('customEndTime')) {
            <span class="pc-error" role="alert">Required</span>
          }
        </label>
      }

      <label class="pc-field pc-field--full">
        <span class="pc-label">Notes</span>
        <div class="pc-inputwrap">
          <textarea class="pc-input" rows="3" formControlName="notes"></textarea>
        </div>
      </label>
    </div>

    <div class="pc-modal__footer">
      <button type="button" class="btn btn--ghost" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn--primary">Save</button>
    </div>
  </form>
</div>
