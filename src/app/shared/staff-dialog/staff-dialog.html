<dialog #dlg class="pc-dialog" aria-labelledby="staff-title" aria-describedby="staff-desc">
  <form method="dialog" class="pc-dialog__inner" (submit)="$event.preventDefault(); onSubmit()">
    <header class="pc-dialog__header">
      <div>
        <div class="muted">Team</div>
        <h2 id="staff-title" class="pc-dialog__title">{{ title() }}</h2>
      </div>

      <button type="button" class="pc-icon-btn" (click)="close()">✕</button>
    </header>

    <div class="pc-dialog__divider"></div>

    <section class="pc-dialog__body">
      <p id="staff-desc" class="muted">
        {{ isInviteMode() ? 'Invite a new team member by email.' : 'Edit an existing team member.' }}
      </p>

      <div class="pc-form">
        <label class="pc-field">
          <span class="pc-field__label">Email</span>
          <input
            type="email"
            class="input"
            autocomplete="email"
            [formControl]="form.controls.email"
            [attr.aria-invalid]="submitted() && form.controls.email.invalid"
          />
          @if (submitted() && form.controls.email.invalid) {
            <span class="pc-field__error">Valid email is required.</span>
          }
        </label>

        @if (!isInviteMode()) {
          <label class="pc-field">
            <span class="pc-field__label">First name</span>
            <input
              type="text"
              class="input"
              autocomplete="given-name"
              [formControl]="form.controls.firstName"
              [attr.aria-invalid]="submitted() && form.controls.firstName.invalid"
            />
            @if (submitted() && form.controls.firstName.invalid) {
              <span class="pc-field__error">First name is required.</span>
            }
          </label>

          <label class="pc-field">
            <span class="pc-field__label">Middle name</span>
            <input
              type="text"
              class="input"
              autocomplete="additional-name"
              [formControl]="form.controls.middleName"
            />
          </label>

          <label class="pc-field">
            <span class="pc-field__label">Last name</span>
            <input
              type="text"
              class="input"
              autocomplete="family-name"
              [formControl]="form.controls.lastName"
              [attr.aria-invalid]="submitted() && form.controls.lastName.invalid"
            />
            @if (submitted() && form.controls.lastName.invalid) {
              <span class="pc-field__error">Last name is required.</span>
            }
          </label>

          <div class="pc-field">
            <span class="pc-field__label">Roles</span>
            <div class="pc-form" style="gap:10px;">
              @for (r of roles; track r) {
                <label class="pc-check">
                  <input
                    type="checkbox"
                    [checked]="hasRole(r)"
                    (change)="toggleRole(r, $any($event.target).checked)"
                  />
                  <span>{{ r }}</span>
                </label>
              }
            </div>
            @if (submitted() && form.controls.roles.invalid) {
              <span class="pc-field__error">Select at least one role.</span>
            }
          </div>

          <label class="pc-check">
            <input type="checkbox" [formControl]="form.controls.active" />
            <span>Active</span>
          </label>
        }
      </div>
    </section>

    <div class="pc-dialog__divider"></div>

    <footer class="pc-dialog__footer">
      <button type="button" class="btn" (click)="close()">Cancel</button>
      <button type="submit" class="btn btn--primary">{{ isInviteMode() ? 'Send invite' : 'Save' }}</button>
    </footer>
  </form>
</dialog>
