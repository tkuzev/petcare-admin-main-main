<a class="skip-link" href="#main">Skip to content</a>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__logo">PC</div>
      <div>
        <div style="opacity:.7; font-size:13px;">PetCare</div>
        <div style="font-weight:800;">Admin</div>
      </div>
    </div>

    <nav class="sidebar__nav" aria-label="Admin navigation">
      <a class="nav-link" routerLink="/dashboard" routerLinkActive="nav-link--active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
      <a class="nav-link" routerLink="/appointments" routerLinkActive="nav-link--active">Appointments</a>
      <a class="nav-link" routerLink="/services" routerLinkActive="nav-link--active">Services</a>
      @if (canAccessStaff()) {
        <a class="nav-link" routerLink="/staff" routerLinkActive="nav-link--active">Staff</a>
      }
    </nav>

    <div class="sidebar__footer">
      {{ currentUser()?.name || 'Admin' }}<br />
      {{ currentUser()?.email || 'sofia@petcare' }}
    </div>
  </aside>

  <div class="main">
    <div class="topbar__inner">
      <div style="font-weight:800;">{{ title() }}</div>

      <div class="topbar__actions">
        <!-- <button type="button" class="btn-icon" aria-label="Notifications">🔔</button>
        <button type="button" class="btn-icon" aria-label="Settings">⚙️</button> -->

        <div class="profile-menu" data-profile-menu-root>
          <button
            type="button"
            class="profile-trigger"
            (click)="toggleProfileMenu($event)"
            [attr.aria-expanded]="isProfileMenuOpen()"
            aria-haspopup="menu"
            aria-label="Open profile menu"
          >
            @if (currentUser()?.pictureUrl) {
              <img class="avatar-image" [src]="currentUser()?.pictureUrl" alt="Profile picture" />
            } @else {
              <div class="avatar" aria-hidden="true">{{ avatarLabel() }}</div>
            }
          </button>

          @if (isProfileMenuOpen()) {
            <div class="profile-dropdown" role="menu">
              <div class="profile-dropdown__header">
                <strong>{{ currentUser()?.name || 'User' }}</strong>
                <span>{{ currentUser()?.email }}</span>
              </div>

              <button type="button" class="profile-dropdown__item" (click)="openProfileDialog()">
                Edit profile
              </button>

              <button type="button" class="profile-dropdown__item profile-dropdown__item--danger" (click)="logout()">
                Logout
              </button>
            </div>
          }
        </div>
      </div>
    </div>

    <main id="main" class="content" tabindex="-1">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<app-profile-dialog
  [open]="isProfileDialogOpen()"
  [profile]="currentUser()"
  [saving]="isProfileSaving()"
  (close)="closeProfileDialog()"
  (save)="saveProfile($event)"
></app-profile-dialog>
